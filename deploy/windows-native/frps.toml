# frps.toml - 中心网关上的 FRP Server 配置
# 官方从较新版本开始更推荐 TOML/YAML/JSON，INI 仍可用但不再推荐。

# frpc 连接 frps 的控制端口。
bindPort = 7000

# 所有 HTTP 类型代理统一通过这个端口接入。
# Caddy 在前面做完鉴权后，会把请求转发到这里。
vhostHTTPPort = 8080

# 使用 token 做 frpc / frps 双端认证。
auth.token = "please-change-this-frp-token"

# 建议默认开启 TLS 强制，避免 frpc 到 frps 的控制流量明文跑在网络上。
# 从官方文档看，frp 新版本默认已经启用 TLS；这里显式打开，减少歧义。
transport.tls.force = true

# 可选：开启本地管理面板，默认只绑定回环地址，避免暴露到公网。
webServer.addr = "127.0.0.1"
webServer.port = 7500
webServer.user = "admin"
webServer.password = "please-change-this-dashboard-password"
